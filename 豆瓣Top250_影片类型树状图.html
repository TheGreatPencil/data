// ===== 每种类型独立配色（豆瓣绿色系风格）=====
const TYPE_COLORS = {
  // 豆瓣绿主色系
  '剧情':  '#007722',  // 豆瓣绿
  '爱情':  '#2d8a4e',  // 深绿
  '喜剧':  '#4a9d64',  // 中绿
  '冒险':  '#1a6b38',  // 暗绿
  '奇幻':  '#5cb85c',  // 浅绿
  '犯罪':  '#0d5c2e',  // 深墨绿
  '动画':  '#28a745',  // 翠绿
  '惊悚':  '#dc3545',  // 红（警示）
  '悬疑':  '#17a2b8',  // 青蓝
  '动作':  '#007bff',  // 蓝
  '科幻':  '#6f42c1',  // 紫
  '家庭':  '#20c997',  // 薄荷绿
  '传记':  '#fd7e14',  // 橙
  '战争':  '#8b4513',  // 棕
  '古装':  '#6b8e23',  // 橄榄绿
  '历史':  '#5f9ea0',  // 灰蓝
  '同性':  '#e83e8c',  // 粉
  '音乐':  '#ffc107',  // 黄
  '歌舞':  '#ff6b6b',  // 珊瑚红
  '儿童':  '#4ecdc4',  // 青绿
  '武侠':  '#8b0000',  // 暗红
  '情色':  '#c41e3a',  // 深红
  '恐怖':  '#800000',  // 酒红
  '灾难':  '#a52a2a',  // 褐红
  '西部':  '#d2691e',  // 巧克力色
  '纪录片':'#708090',  // 灰
  '运动':  '#4169e1',  // 皇家蓝
};

// 备用色（动态数据中出现的新类型，从色盘循环取）
const FALLBACK_PALETTE = [
  '#007722','#2d8a4e','#4a9d64','#1a6b38','#5cb85c',
  '#28a745','#20c997','#17a2b8','#007bff','#6f42c1'
];

function getColor(name) {
  if (TYPE_COLORS[name]) return TYPE_COLORS[name];
  // 对未知类型按名字哈希取色
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) & 0xffff;
  return FALLBACK_PALETTE[hash % FALLBACK_PALETTE.length];
}

// ===== Squarified Treemap 算法（修正版）=====
// 规则：w>=h 时横向切带（带内矩形等高、宽按比例）；w<h 时纵向切带（带内矩形等宽、高按比例）
function squarify(items, x, y, w, h) {
  if (!items.length) return [];
  const total = items.reduce((s, d) => s + d.value, 0);

  // 计算当前行的最差长宽比（越接近1越好）
  function worst(row, bandLen, areaTotal) {
    const s   = row.reduce((a, b) => a + b.value, 0);
    const max = Math.max(...row.map(d => d.value));
    const min = Math.min(...row.map(d => d.value));
    // 每个矩形在带内的宽 = s/areaTotal * bandLen（带宽）
    // 每个矩形的高 = d.value/s * bandLen（实为band厚度的倒数关系）
    const r1 = (bandLen * bandLen * max) / (s * s);
    const r2 = (s * s) / (bandLen * bandLen * min);
    return Math.max(r1, r2);
  }

  // 把一行矩形布局到 (x,y,w,h) 区域内
  function layoutRow(row, x, y, w, h, areaTotal) {
    const s = row.reduce((a, b) => a + b.value, 0);
    const rects = [];
    if (w >= h) {
      // 横向带：带高 = s/areaTotal * h，带内矩形等高、宽按比例
      const bandH = (s / areaTotal) * h;
      let cx = x;
      for (const d of row) {
        const rw = (d.value / s) * w;
        rects.push({ ...d, x: cx, y, w: rw, h: bandH });
        cx += rw;
      }
    } else {
      // 纵向带：带宽 = s/areaTotal * w，带内矩形等宽、高按比例
      const bandW = (s / areaTotal) * w;
      let cy = y;
      for (const d of row) {
        const rh = (d.value / s) * h;
        rects.push({ ...d, x, y: cy, w: bandW, h: rh });
        cy += rh;
      }
    }
    return rects;
  }

  function squarifyRec(items, x, y, w, h, areaTotal, result) {
    if (!items.length) return;
    if (items.length === 1) {
      result.push(...layoutRow(items, x, y, w, h, areaTotal));
      return;
    }
    // bandLen：当前短边，用于计算长宽比
    const bandLen = w >= h ? w : h;
    let row = [];
    let i = 0;
    while (i < items.length) {
      const next = [...row, items[i]];
      if (row.length === 0 || worst(next, bandLen, areaTotal) <= worst(row, bandLen, areaTotal)) {
        row = next;
        i++;
      } else {
        break;
      }
    }
    const placed = layoutRow(row, x, y, w, h, areaTotal);
    result.push(...placed);
    // 计算剩余空间
    const s = row.reduce((a, b) => a + b.value, 0);
    if (w >= h) {
      const usedH = (s / areaTotal) * h;
      squarifyRec(items.slice(i), x, y + usedH, w, h - usedH, areaTotal - s, result);
    } else {
      const usedW = (s / areaTotal) * w;
      squarifyRec(items.slice(i), x + usedW, y, w - usedW, h, areaTotal - s, result);
    }
  }

  const result = [];
  squarifyRec(items, x, y, w, h, total, result);
  return result;
}

// ===== 绘制 =====
const canvas = document.getElementById('treemap');
const wrap   = canvas.parentElement;
const tooltip = document.getElementById('tooltip');
let rects = [];

function draw() {
  const W = wrap.clientWidth;
  const H = Math.round(W * 0.62);
  canvas.width  = W;
  canvas.height = H;
  // canvas.style.height 由 canvas.height 自动决定，无需重复设置

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const sorted = [...data].sort((a, b) => b.value - a.value);
  const total  = data.reduce((s, d) => s + d.value, 0);
  rects = squarify(sorted, 0, 0, W, H);

  rects.forEach(r => {
    const color = getColor(r.name);
    const pad = 3;
    const rx = r.x + pad;
    const ry = r.y + pad;
    const rw = r.w - pad * 2;
    const rh = r.h - pad * 2;
    if (rw < 2 || rh < 2) return;

    // 圆角矩形路径（复用）
    const radius = Math.min(6, rw / 2, rh / 2);
    function roundRect() {
      ctx.beginPath();
      ctx.moveTo(rx + radius, ry);
      ctx.lineTo(rx + rw - radius, ry);
      ctx.arcTo(rx + rw, ry, rx + rw, ry + radius, radius);
      ctx.lineTo(rx + rw, ry + rh - radius);
      ctx.arcTo(rx + rw, ry + rh, rx + rw - radius, ry + rh, radius);
      ctx.lineTo(rx + radius, ry + rh);
      ctx.arcTo(rx, ry + rh, rx, ry + rh - radius, radius);
      ctx.lineTo(rx, ry + radius);
      ctx.arcTo(rx, ry, rx + radius, ry, radius);
      ctx.closePath();
    }

    // 主体渐变填充（豆瓣风格：从浅色到深色的绿色渐变）
    const mainGrd = ctx.createLinearGradient(rx, ry, rx + rw, ry + rh);
    // 将颜色转为RGB并创建浅色版本
    mainGrd.addColorStop(0, color + 'dd');   // 87% 不透明度
    mainGrd.addColorStop(1, color + 'aa');   // 67% 不透明度
    roundRect();
    ctx.fillStyle = mainGrd;
    ctx.fill();

    // 顶部高光条（白色微透明）
    const glowH = Math.min(rh * 0.35, 40);
    const grd = ctx.createLinearGradient(0, ry, 0, ry + glowH);
    grd.addColorStop(0, 'rgba(255,255,255,0.25)');
    grd.addColorStop(1, 'rgba(255,255,255,0)');
    roundRect();
    ctx.fillStyle = grd;
    ctx.fill();

    // 细边框
    roundRect();
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 文字区域
    const innerW = rw - 14;
    const innerH = rh - 10;
    if (innerW < 18 || innerH < 12) return;

    // 文字左上对齐（参考图风格）
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    const tx = rx + 8;
    const ty = ry + 7;

    if (innerH >= 54 && innerW >= 55) {
      // 大格子：类型名大字 + 数量 + 百分比，左上对齐
      const fs1 = Math.min(Math.floor(innerW / 3.5), Math.floor(innerH / 3.8), 28);
      ctx.font = `700 ${fs1}px "Microsoft YaHei", sans-serif`;
      ctx.fillStyle = '#ffffff';
      ctx.fillText(r.name, tx, ty);

      const fs2 = Math.max(Math.round(fs1 * 0.62), 11);
      ctx.font = `${fs2}px "Microsoft YaHei", sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillText(`${r.value} 部`, tx, ty + fs1 + 4);

      if (innerH >= 90) {
        const pct = ((r.value / total) * 100).toFixed(1);
        ctx.font = `${Math.max(Math.round(fs2 * 0.88), 10)}px "Microsoft YaHei", sans-serif`;
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.fillText(`${pct}%`, tx, ty + fs1 + fs2 + 8);
      }
    } else if (innerH >= 28 && innerW >= 32) {
      // 中格子：类型名 + 数量，左上对齐
      const fs = Math.min(Math.floor(innerW / 3.8), Math.floor(innerH / 2.6), 16);
      ctx.font = `700 ${fs}px "Microsoft YaHei", sans-serif`;
      ctx.fillStyle = '#ffffff';
      ctx.fillText(r.name, tx, ty);
      const fs2 = Math.max(Math.round(fs * 0.72), 10);
      ctx.font = `${fs2}px "Microsoft YaHei", sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillText(`${r.value}`, tx, ty + fs + 3);
    } else {
      // 小格子：只放类型名
      const fs = Math.min(Math.floor(innerW / 2.8), Math.floor(innerH / 1.5), 13);
      if (fs >= 8) {
        ctx.font = `700 ${fs}px "Microsoft YaHei", sans-serif`;
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.fillText(r.name, tx, ty);
      }
    }
  });
}

// ===== Tooltip =====
canvas.addEventListener('mousemove', e => {
  const rc  = canvas.getBoundingClientRect();
  const mx  = (e.clientX - rc.left) * (canvas.width / rc.width);
  const my  = (e.clientY - rc.top)  * (canvas.height / rc.height);
  const hit = rects.find(r => mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h);
  if (hit) {
    const total = data.reduce((s, d) => s + d.value, 0);
    const pct = ((hit.value / total) * 100).toFixed(1);
    tooltip.innerHTML = `
      <div class="t-name">${hit.name}</div>
      <div class="t-count">影片数量：<strong>${hit.value}</strong> 部</div>
      <div class="t-pct">占比：${pct}%（共 ${total} 部）</div>`;
    tooltip.classList.add('show');
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.classList.remove('show');
    canvas.style.cursor = 'default';
  }
});
canvas.addEventListener('mouseleave', () => tooltip.classList.remove('show'));

function buildLegend() {
  const wrap = document.getElementById('legendWrap');
  const legendData = [
    { label: '100+ 部', names: ['剧情'] },
    { label: '40–99 部', names: ['爱情','喜剧','冒险'] },
    { label: '20–39 部', names: ['奇幻','犯罪','动画'] },
    { label: '10–19 部', names: ['惊悚','悬疑','动作'] },
    { label: '4–9 部',   names: ['科幻','家庭'] },
    { label: '1–3 部',   names: ['恐怖','灾难'] },
  ];
  legendData.forEach(g => {
    const sampleColor = getColor(g.names[0]);
    wrap.innerHTML += `
      <div class="legend-item">
        <div class="legend-dot" style="background:${sampleColor}"></div>
        <span>${g.label}</span>
      </div>`;
  });
}

// ===== 排行榜 =====
function buildRanking() {
  const sorted = [...data].sort((a, b) => b.value - a.value);
  const maxV  = sorted[0].value;
  const total = data.reduce((s, d) => s + d.value, 0);
  const container = document.getElementById('rankList');
  container.innerHTML = '';
  sorted.forEach((item, i) => {
    const color = getColor(item.name);
    const pct   = Math.round((item.value / maxV) * 100);
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}`;
    // 进度条：从颜色本身渐变到稍浅版本
    const barGrad = `linear-gradient(90deg, ${color}, ${color}aa)`;
    container.innerHTML += `
      <div class="rank-item">
        <div class="rank-badge" style="background:${color}22;border:1px solid ${color}55;color:${color};font-size:${i<3?'15px':'12px'}">${medal}</div>
        <div class="rank-info">
          <div class="rank-name">${item.name}</div>
          <div class="rank-bar-bg">
            <div class="rank-bar" style="width:${pct}%;background:${barGrad}"></div>
          </div>
        </div>
        <div class="rank-val" style="color:${color}">${item.value}</div>
      </div>`;
  });
}

// ===== 初始化 =====
window.addEventListener('load', () => {
  buildLegend();
  draw();
  buildRanking();
});
window.addEventListener('resize', draw);
</script>
</body>
</html>

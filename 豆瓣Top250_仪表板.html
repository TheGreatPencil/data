<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>豆瓣 Top 250 · 数据仪表板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#0a0a15;
  --panel:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#fff;
  --muted:rgba(255,255,255,0.45);
  --accent1:#f9d423;
  --accent2:#43e97b;
  --accent3:#00c6ff;
  --accent4:#f5576c;
  --accent5:#a78bfa;
  --sidebar-w:280px;
}

body{
  font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ====== TOP BAR ====== */
.topbar{
  height:56px;
  background:rgba(255,255,255,0.03);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 24px;
  gap:16px;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.topbar-logo{
  font-size:18px;font-weight:700;letter-spacing:1px;
  background:linear-gradient(90deg,#f9d423,#ff4e50,#f093fb);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;
}
.topbar-stats{
  display:flex;gap:12px;flex-wrap:wrap;flex:1;
}
.topbar-stat{
  font-size:12px;color:var(--muted);
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:16px;padding:4px 12px;
  white-space:nowrap;
}
.topbar-stat strong{color:#f9d423;}

/* 上传区 */
.upload-area{
  display:flex;align-items:center;gap:8px;
  margin-left:auto;
}
.upload-btn{
  position:relative;overflow:hidden;
  padding:8px 18px;
  background:linear-gradient(90deg,#667eea,#764ba2);
  border:none;border-radius:10px;
  color:#fff;font-size:12px;font-weight:600;
  cursor:pointer;transition:opacity .2s,transform .2s;
  white-space:nowrap;letter-spacing:.5px;
}
.upload-btn:hover{opacity:.88;transform:translateY(-1px);}
.upload-btn input[type=file]{
  position:absolute;top:0;left:0;width:100%;height:100%;
  opacity:0;cursor:pointer;
}
.upload-hint{font-size:11px;color:var(--muted);}
.filter-badge{
  background:rgba(102,126,234,.2);border:1px solid rgba(102,126,234,.4);
  border-radius:12px;padding:4px 10px;font-size:11px;color:#a78bfa;
  display:none;align-items:center;gap:6px;
}
.filter-badge.show{display:flex;}
.filter-badge button{background:none;border:none;color:#f5576c;cursor:pointer;font-size:13px;line-height:1;}

/* ====== MAIN LAYOUT ====== */
.main{
  display:flex;flex:1;gap:0;
}

/* ====== LEFT SIDEBAR (筛选) ====== */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:rgba(255,255,255,0.025);
  border-right:1px solid var(--border);
  padding:20px 16px;
  overflow-y:auto;
  max-height:calc(100vh - 56px);
  position:sticky;top:56px;
}
.sidebar h3{
  font-size:13px;font-weight:600;color:var(--muted);
  letter-spacing:1px;margin-bottom:12px;
  text-transform:uppercase;
}
.filter-section{margin-bottom:20px;}
.filter-section label{
  display:block;font-size:12px;color:var(--muted);
  margin-bottom:6px;
}
.filter-section select,
.filter-section input[type=range]{
  width:100%;padding:8px 10px;
  background:rgba(255,255,255,0.07);
  border:1px solid var(--border);
  border-radius:8px;color:#fff;font-size:12px;
  outline:none;cursor:pointer;
}
.filter-section select option{background:#1a1a2e;}
.range-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px;}
.search-wrap{position:relative;}
.search-wrap input{
  width:100%;padding:8px 10px 8px 32px;
  background:rgba(255,255,255,0.07);
  border:1px solid var(--border);
  border-radius:8px;color:#fff;font-size:12px;outline:none;
}
.search-wrap::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.6;}
.btn-reset{
  width:100%;padding:9px;
  background:rgba(245,87,108,.15);border:1px solid rgba(245,87,108,.3);
  border-radius:8px;color:#f5576c;font-size:12px;
  cursor:pointer;transition:background .2s;margin-top:8px;
}
.btn-reset:hover{background:rgba(245,87,108,.25);}

/* 激活筛选项标签 */
.active-filters{margin-bottom:16px;}
.af-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(102,126,234,.15);border:1px solid rgba(102,126,234,.3);
  border-radius:10px;padding:3px 8px;font-size:11px;color:#a78bfa;
  margin:2px;
}
.af-tag span{cursor:pointer;color:#f5576c;font-size:12px;}

/* ====== CONTENT ====== */
.content{
  flex:1;padding:20px 20px 40px;
  overflow-y:auto;min-width:0;
}

/* ====== CARDS GRID ====== */
.cards-top{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;margin-bottom:20px;
}
.kpi-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;
  transition:transform .2s,background .2s;
}
.kpi-card:hover{transform:translateY(-2px);background:rgba(255,255,255,.07);}
.kpi-val{font-size:24px;font-weight:700;line-height:1.2;}
.kpi-lbl{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.5px;}
.kpi-delta{font-size:11px;color:#43e97b;margin-top:4px;}

/* ====== CHARTS GRID ====== */
.charts-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.chart-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:18px;overflow:hidden;
  display:flex;flex-direction:column;
}
.chart-card.full{grid-column:1/-1;}
.chart-card.tall{grid-row:span 2;}

.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 10px;border-bottom:1px solid var(--border);
}
.card-title{
  font-size:14px;font-weight:600;
  display:flex;align-items:center;gap:8px;
}
.card-title .dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.card-actions{display:flex;gap:8px;align-items:center;}
.drill-btn{
  padding:5px 12px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:7px;color:rgba(255,255,255,.7);
  font-size:11px;cursor:pointer;
  transition:all .2s;white-space:nowrap;
  text-decoration:none;display:inline-block;
}
.drill-btn:hover{background:rgba(255,255,255,.14);color:#fff;}

.card-body{
  flex:1;padding:16px;min-height:0;
  display:flex;flex-direction:column;
}

/* ECharts 容器 */
.echart-box{
  width:100%;
  flex:1;
  min-height:280px;
}

/* ====== 表格迷你预览 ====== */
.mini-table{width:100%;border-collapse:collapse;font-size:12px;}
.mini-table th{
  background:rgba(255,255,255,.06);padding:8px 10px;
  text-align:left;font-weight:600;color:var(--muted);
  border-bottom:1px solid var(--border);white-space:nowrap;
}
.mini-table td{
  padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);
  color:rgba(255,255,255,.8);
}
.mini-table tr:hover td{background:rgba(255,255,255,.03);}
.badge-rank{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  font-size:10px;font-weight:700;
}
.badge-rank.g{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#000;}
.badge-rank.s{background:linear-gradient(135deg,#c0c0c0,#888);color:#000;}
.badge-rank.b{background:linear-gradient(135deg,#cd7f32,#8b4513);color:#fff;}
.badge-rank.o{background:rgba(255,255,255,.12);color:#ccc;}
.star-rating{color:#f9d423;letter-spacing:1px;font-size:11px;}
.table-pager{
  display:flex;justify-content:flex-end;align-items:center;
  gap:6px;margin-top:10px;padding-top:8px;
  border-top:1px solid var(--border);
}
.pager-btn{
  padding:5px 10px;background:rgba(255,255,255,.06);
  border:1px solid var(--border);border-radius:6px;
  color:var(--muted);font-size:11px;cursor:pointer;
}
.pager-btn.active{background:linear-gradient(90deg,#f093fb,#f5576c);border-color:transparent;color:#fff;}
.pager-btn:disabled{opacity:.3;cursor:not-allowed;}
.pager-info{font-size:11px;color:var(--muted);}

/* ====== 联动高亮 ====== */
.filter-active{
  outline:2px solid rgba(249,212,35,0.6);
  outline-offset:2px;
}

/* ====== 滚动条 ====== */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:rgba(255,255,255,.03);}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.22);}

/* ====== Tooltip ====== */
.global-tip{
  position:fixed;background:rgba(10,10,30,.94);
  border:1px solid rgba(255,255,255,.15);border-radius:10px;
  padding:10px 14px;font-size:12px;color:#fff;
  pointer-events:none;opacity:0;transition:opacity .15s;
  z-index:9999;line-height:1.8;max-width:240px;
}
.global-tip.show{opacity:1;}

/* ====== 响应式 ====== */
@media(max-width:1100px){
  .charts-grid{grid-template-columns:1fr;}
  .chart-card.full{grid-column:1;}
}
@media(max-width:780px){
  .sidebar{display:none;}
  .cards-top{grid-template-columns:repeat(3,1fr);}
}
@media(max-width:500px){
  .cards-top{grid-template-columns:repeat(2,1fr);}
  .topbar-stats{display:none;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">🎬 豆瓣 Top 250 · 数据仪表板</div>
  <div class="topbar-stats" id="topStats">
    <div class="topbar-stat"><strong id="statTotal">250</strong> 部影片</div>
    <div class="topbar-stat">评分 <strong>8.4–9.7</strong></div>
    <div class="topbar-stat">年份 <strong>1931–2023</strong></div>
    <div class="topbar-stat"><strong>31</strong> 个国家/地区</div>
  </div>
  <div class="upload-area">
    <div class="filter-badge" id="filterBadge">
      <span>已筛选</span>
      <button onclick="resetAllFilters()" title="清空筛选">✕</button>
    </div>
    <label class="upload-btn">
      📂 上传新数据
      <input type="file" id="fileUpload" accept=".csv,.xlsx,.xls" onchange="handleUpload(event)"/>
    </label>
    <span class="upload-hint">支持 CSV / Excel</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="filter-section">
      <h3>🔍 搜索</h3>
      <div class="search-wrap">
        <input type="text" id="sideSearch" placeholder="片名、导演…" oninput="applyFilters()"/>
      </div>
    </div>
    <div class="filter-section">
      <h3>🎯 筛选</h3>
      <label>影片类型</label>
      <select id="fGenre" onchange="applyFilters()">
        <option value="">所有类型</option>
        <option>剧情</option><option>爱情</option><option>喜剧</option>
        <option>动作</option><option>犯罪</option><option>动画</option>
        <option>悬疑</option><option>惊悚</option><option>科幻</option>
        <option>冒险</option><option>奇幻</option><option>家庭</option>
        <option>传记</option><option>战争</option><option>历史</option>
        <option>同性</option><option>音乐</option><option>歌舞</option>
      </select>
    </div>
    <div class="filter-section">
      <label>制片国家/地区</label>
      <select id="fCountry" onchange="applyFilters()">
        <option value="">所有国家</option>
        <option>美国</option><option>中国</option><option>英国</option>
        <option>日本</option><option>法国</option><option>韩国</option>
        <option>德国</option><option>意大利</option><option>加拿大</option>
        <option>澳大利亚</option><option>西班牙</option>
      </select>
    </div>
    <div class="filter-section">
      <label>上映年代</label>
      <select id="fEra" onchange="applyFilters()">
        <option value="">所有年代</option>
        <option value="1930">1930s</option>
        <option value="1940">1940s</option>
        <option value="1950">1950s</option>
        <option value="1960">1960s</option>
        <option value="1970">1970s</option>
        <option value="1980">1980s</option>
        <option value="1990">1990s</option>
        <option value="2000">2000s</option>
        <option value="2010">2010s</option>
        <option value="2020">2020s</option>
      </select>
    </div>
    <div class="filter-section">
      <label>评分范围：<span id="ratingLabel">8.4 – 9.7</span></label>
      <input type="range" id="fRatingMin" min="8.4" max="9.7" step="0.1" value="8.4" oninput="applyFilters()"/>
      <div class="range-labels"><span>8.4</span><span>9.7</span></div>
    </div>
    <button class="btn-reset" onclick="resetAllFilters()">↺ 重置所有筛选</button>
    <div class="active-filters" id="activeTags" style="margin-top:12px;"></div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- KPI -->
    <div class="cards-top">
      <div class="kpi-card">
        <div class="kpi-val" style="color:#f9d423" id="kpiTotal">250</div>
        <div class="kpi-lbl">当前影片数</div>
        <div class="kpi-delta" id="kpiDelta">全部 250 部</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="color:#43e97b" id="kpiAvgRating">8.95</div>
        <div class="kpi-lbl">平均评分</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="color:#00c6ff" id="kpiTopCountry">美国</div>
        <div class="kpi-lbl">最多产国家</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="color:#f093fb" id="kpiTopGenre">剧情</div>
        <div class="kpi-lbl">最多类型</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="color:#fc8c45" id="kpiTopEra">2010s</div>
        <div class="kpi-lbl">最多年代</div>
      </div>
    </div>

    <!-- CHARTS GRID -->
    <div class="charts-grid">

      <!-- 1. 导演词云（模拟热力柱图代替词云，词云需canvas复杂实现） -->
      <div class="chart-card">
        <div class="card-header">
          <div class="card-title"><div class="dot" style="background:#f9d423"></div>导演执导影片数</div>
          <div class="card-actions">
            <a class="drill-btn" href="豆瓣Top250_导演词云图.html" target="_blank">🔍 下钻查看词云图</a>
          </div>
        </div>
        <div class="card-body">
          <div class="echart-box" id="chartDirector"></div>
        </div>
      </div>

      <!-- 2. 影片类型树状图 -->
      <div class="chart-card">
        <div class="card-header">
          <div class="card-title"><div class="dot" style="background:#43e97b"></div>影片类型分布</div>
          <div class="card-actions">
            <a class="drill-btn" href="豆瓣Top250_影片类型树状图.html" target="_blank">🔍 下钻查看树状图</a>
          </div>
        </div>
        <div class="card-body">
          <div class="echart-box" id="chartGenre"></div>
        </div>
      </div>

      <!-- 3. 片长分布柱形图 -->
      <div class="chart-card">
        <div class="card-header">
          <div class="card-title"><div class="dot" style="background:#a78bfa"></div>影片时长分布</div>
          <div class="card-actions">
            <a class="drill-btn" href="豆瓣Top250_影片时长柱形图.html" target="_blank">🔍 下钻查看柱形图</a>
          </div>
        </div>
        <div class="card-body">
          <div class="echart-box" id="chartDuration"></div>
        </div>
      </div>

      <!-- 4. 年份分布柱形图 -->
      <div class="chart-card">
        <div class="card-header">
          <div class="card-title"><div class="dot" style="background:#f7971e"></div>上映年代分布</div>
          <div class="card-actions">
            <a class="drill-btn" href="豆瓣Top250_上映年份柱形图.html" target="_blank">🔍 下钻查看柱形图</a>
          </div>
        </div>
        <div class="card-body">
          <div class="echart-box" id="chartYear"></div>
        </div>
      </div>

      <!-- 5. 制片国家地图 -->
      <div class="chart-card full">
        <div class="card-header">
          <div class="card-title"><div class="dot" style="background:#00c6ff"></div>制片国家/地区分布</div>
          <div class="card-actions">
            <a class="drill-btn" href="豆瓣Top250_制片国家世界地图.html" target="_blank">🔍 下钻查看世界地图</a>
          </div>
        </div>
        <div class="card-body">
          <div class="echart-box" id="chartMap" style="min-height:360px;"></div>
        </div>
      </div>

      <!-- 6. 完整数据表格 -->
      <div class="chart-card full">
        <div class="card-header">
          <div class="card-title"><div class="dot" style="background:#f5576c"></div>影片数据总览</div>
          <div class="card-actions">
            <span id="tableCount" style="font-size:12px;color:var(--muted);">250 条</span>
            <a class="drill-btn" href="豆瓣Top250_完整数据表格.html" target="_blank">🔍 下钻查看完整表格</a>
          </div>
        </div>
        <div class="card-body" style="padding:0 16px 16px;">
          <div style="overflow-x:auto;max-height:340px;overflow-y:auto;">
            <table class="mini-table" id="miniTable">
              <thead>
                <tr>
                  <th>排名</th><th>片名</th><th>导演</th><th>国家</th>
                  <th>类型</th><th>年份</th><th>评分</th><th>一句话影评</th>
                </tr>
              </thead>
              <tbody id="miniTbody"></tbody>
            </table>
          </div>
          <div class="table-pager" id="miniPager"></div>
        </div>
      </div>

    </div><!-- /charts-grid -->
  </div><!-- /content -->
</div><!-- /main -->

<div class="global-tip" id="gTip"></div>

];

// ================================================================
//  全局状态
// ================================================================
let currentData = [...FULL_DATA];
let filters = { search:'', genre:'', country:'', era:'', ratingMin:8.4, _durGroup:'' };
let tablePage = 1;
const TABLE_PAGE_SIZE = 8;

// ECharts 实例
let charts = {};

// ================================================================
//  工具函数
// ================================================================
function countBy(arr, keyFn) {
  const map = {};
  arr.forEach(d => {
    const k = keyFn(d);
    if(k) {
      const keys = Array.isArray(k) ? k : [k];
      keys.forEach(kk => { map[kk] = (map[kk]||0)+1; });
    }
  });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}

function avgRating(arr) {
  if(!arr.length) return 0;
  return (arr.reduce((s,d)=>s+d.rating,0)/arr.length).toFixed(2);
}

function getEra(year) { return Math.floor(year/10)*10; }

function getDurationGroup(min) {
  if(min<30) return '0~29';
  if(min<60) return '30~59';
  if(min<90) return '60~89';
  if(min<120) return '90~119';
  if(min<150) return '120~149';
  if(min<180) return '150~179';
  if(min<210) return '180~209';
  return '210~239';
}

// ================================================================
//  筛选逻辑
// ================================================================
function applyFilters() {
  const s = document.getElementById('sideSearch').value.toLowerCase();
  const g = document.getElementById('fGenre').value;
  const c = document.getElementById('fCountry').value;
  const e = document.getElementById('fEra').value;
  const rMin = parseFloat(document.getElementById('fRatingMin').value);

  document.getElementById('ratingLabel').textContent = rMin.toFixed(1) + ' – 9.7';
  // 保留 _durGroup，只更新侧边栏来源的字段
  filters.search    = s;
  filters.genre     = g;
  filters.country   = c;
  filters.era       = e;
  filters.ratingMin = rMin;
  // _durGroup 由时长柱图点击维护，此处不覆盖

  const durGrp = filters._durGroup || '';
  currentData = FULL_DATA.filter(d => {
    if(s && !d.title.includes(s) && !d.director.includes(s) && !d.genre.includes(s)) return false;
    if(g && !d.genre.includes(g)) return false;
    if(c && !d.country.includes(c)) return false;
    if(e && getEra(d.year) !== parseInt(e)) return false;
    if(d.rating < rMin) return false;
    if(durGrp && getDurationGroup(d.duration) !== durGrp) return false;
    return true;
  });

  tablePage = 1;
  updateAll();
  updateActiveTags();

  const hasFilter = s||g||c||e||(rMin>8.4)||durGrp;
  document.getElementById('filterBadge').classList.toggle('show', !!hasFilter);
}

function resetAllFilters() {
  document.getElementById('sideSearch').value = '';
  document.getElementById('fGenre').value = '';
  document.getElementById('fCountry').value = '';
  document.getElementById('fEra').value = '';
  document.getElementById('fRatingMin').value = 8.4;
  document.getElementById('ratingLabel').textContent = '8.4 – 9.7';
  document.getElementById('filterBadge').classList.remove('show');
  filters = {search:'',genre:'',country:'',era:'',ratingMin:8.4,_durGroup:''};
  currentData = [...FULL_DATA];
  tablePage = 1;
  updateAll();
  updateActiveTags();
}

function updateActiveTags() {
  const tags = [];
  if(filters.search) tags.push(`搜索：${filters.search}`);
  if(filters.genre) tags.push(`类型：${filters.genre}`);
  if(filters.country) tags.push(`国家：${filters.country}`);
  if(filters.era) tags.push(`年代：${filters.era}s`);
  if(filters.ratingMin>8.4) tags.push(`评分≥${filters.ratingMin}`);
  if(filters._durGroup) tags.push(`时长：${filters._durGroup}分钟`);

  const el = document.getElementById('activeTags');
  el.innerHTML = tags.map(t=>`<div class="af-tag">${t} <span onclick="resetAllFilters()">✕</span></div>`).join('');
}

// ================================================================
//  更新所有组件
// ================================================================
function updateAll() {
  updateKPI();
  renderDirectorChart();
  renderGenreChart();
  renderDurationChart();
  renderYearChart();
  renderMapChart();
  renderMiniTable();
}

function updateKPI() {
  const total = currentData.length;
  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiDelta').textContent = `共 ${total} 部（全部 ${FULL_DATA.length} 部）`;
  document.getElementById('kpiAvgRating').textContent = avgRating(currentData);
  document.getElementById('statTotal').textContent = total;

  const countryCounts = countBy(currentData, d=>d.country);
  document.getElementById('kpiTopCountry').textContent = countryCounts.length ? countryCounts[0][0] : '-';

  const genreCounts = countBy(currentData, d=>d.genre.split(' '));
  document.getElementById('kpiTopGenre').textContent = genreCounts.length ? genreCounts[0][0] : '-';

  const eraCounts = countBy(currentData, d=>getEra(d.year)+'s');
  document.getElementById('kpiTopEra').textContent = eraCounts.length ? eraCounts[0][0] : '-';

  document.getElementById('tableCount').textContent = `${total} 条`;
}

// ================================================================
//  导演图（横向柱图 Top 10）
// ================================================================
function renderDirectorChart() {
  if(!charts.director) {
    charts.director = echarts.init(document.getElementById('chartDirector'));
  }
  const dirCounts = countBy(currentData, d=>d.director).slice(0,10).reverse();
  charts.director.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'axis',backgroundColor:'rgba(10,10,30,.92)',borderColor:'rgba(255,255,255,.15)',textStyle:{color:'#fff',fontSize:12},axisPointer:{type:'shadow'}},
    grid:{left:120,right:20,top:10,bottom:20},
    xAxis:{type:'value',splitLine:{lineStyle:{color:'rgba(255,255,255,.06)'}},axisLabel:{color:'rgba(255,255,255,.4)',fontSize:11}},
    yAxis:{type:'category',data:dirCounts.map(d=>d[0]),axisLabel:{color:'rgba(255,255,255,.7)',fontSize:12},axisTick:{show:false}},
    series:[{
      type:'bar',
      data:dirCounts.map(d=>d[1]),
      barMaxWidth:18,
      itemStyle:{color:new echarts.graphic.LinearGradient(1,0,0,0,[{offset:0,color:'#f9d423'},{offset:1,color:'#ff4e50'}]),borderRadius:[0,6,6,0]},
      label:{show:true,position:'right',color:'rgba(255,255,255,.7)',fontSize:11}
    }]
  }, true);
  bindDirectorEvents();
}

// ================================================================
//  类型图（饼图/环图）
// ================================================================
function renderGenreChart() {
  if(!charts.genre) {
    charts.genre = echarts.init(document.getElementById('chartGenre'));
  }
  const genreCounts = countBy(currentData, d=>d.genre.split(' ')).slice(0,10);
  const colors = ['#43e97b','#38f9d7','#667eea','#f093fb','#f5576c','#fda085','#ffd700','#a8edea','#fccb90','#c471f5'];
  charts.genre.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'item',backgroundColor:'rgba(10,10,30,.92)',borderColor:'rgba(255,255,255,.15)',textStyle:{color:'#fff',fontSize:12},formatter:'{b}: {c} 部（{d}%）'},
    legend:{orient:'vertical',right:0,top:'center',textStyle:{color:'rgba(255,255,255,.6)',fontSize:11},itemWidth:10,itemHeight:10},
    series:[{
      type:'pie',radius:['40%','72%'],center:['38%','50%'],
      label:{show:false},
      labelLine:{show:false},
      data:genreCounts.map((d,i)=>({name:d[0],value:d[1],itemStyle:{color:colors[i%colors.length]}}))
    }]
  }, true);
  bindGenreEvents();
}

// ================================================================
//  时长分布（柱图）
// ================================================================
function renderDurationChart() {
  if(!charts.dur) {
    charts.dur = echarts.init(document.getElementById('chartDuration'));
  }
  const groups = ['0~29','30~59','60~89','90~119','120~149','150~179','180~209','210~239'];
  const counts = groups.map(g => currentData.filter(d=>getDurationGroup(d.duration)===g).length);
  // 高亮当前已选时长区间（若有）
  const selDur = filters._durGroup || '';
  charts.dur.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'axis',backgroundColor:'rgba(10,10,30,.92)',borderColor:'rgba(255,255,255,.15)',textStyle:{color:'#fff',fontSize:12},axisPointer:{type:'shadow'},formatter:p=>`<strong style="color:#a78bfa">${p[0].name} 分钟</strong><br/>影片数：${p[0].value} 部`},
    grid:{left:36,right:12,top:24,bottom:48},
    xAxis:{type:'category',data:groups,axisLabel:{color:'rgba(255,255,255,.5)',fontSize:10,rotate:15},axisTick:{show:false}},
    yAxis:{type:'value',splitLine:{lineStyle:{color:'rgba(255,255,255,.06)'}},axisLabel:{color:'rgba(255,255,255,.4)',fontSize:11}},
    series:[{
      type:'bar',data:counts.map((v,i)=>({
        value:v,
        itemStyle:{
          color: selDur===groups[i]
            ? new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#f9d423'},{offset:1,color:'#ff4e50'}])
            : new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#a78bfa'},{offset:1,color:'#5b21b6'}]),
          borderRadius:[6,6,0,0]
        }
      })),
      barMaxWidth:40,
      label:{show:true,position:'top',color:'rgba(255,255,255,.7)',fontSize:11}
    }]
  }, true);
  // 绑定点击：时长区间 → 过滤数据
  if(!charts.dur._bound) {
    charts.dur._bound = true;
    charts.dur.on('click', params=>{
      const grp = params.name || '';
      // toggle
      if(filters._durGroup === grp) {
        filters._durGroup = '';
      } else {
        filters._durGroup = grp;
      }
      applyFilters();
    });
  }
}

// ================================================================
//  年代分布（柱图）
// ================================================================
function renderYearChart() {
  if(!charts.year) {
    charts.year = echarts.init(document.getElementById('chartYear'));
  }
  const eras  = [1930,1940,1950,1960,1970,1980,1990,2000,2010,2020];
  const labels = eras.map(e=>e+'s');
  const counts = eras.map(e=>currentData.filter(d=>getEra(d.year)===e).length);
  const BASE_C = ['#b45309','#b45309','#c2410c','#b91c1c','#7e22ce','#1d4ed8','#0369a1','#047857','#15803d','#0f766e'];
  const selEra = document.getElementById('fEra').value;
  charts.year.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'axis',backgroundColor:'rgba(10,10,30,.92)',borderColor:'rgba(255,255,255,.15)',textStyle:{color:'#fff',fontSize:12},axisPointer:{type:'shadow'}},
    grid:{left:36,right:12,top:24,bottom:40},
    xAxis:{type:'category',data:labels,axisLabel:{color:'rgba(255,255,255,.5)',fontSize:11},axisTick:{show:false}},
    yAxis:{type:'value',splitLine:{lineStyle:{color:'rgba(255,255,255,.06)'}},axisLabel:{color:'rgba(255,255,255,.4)',fontSize:11}},
    series:[{
      type:'bar',
      data:counts.map((v,i)=>({
        value:v,
        itemStyle:{
          color: selEra===String(eras[i])
            ? new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#f9d423'},{offset:1,color:'#ff4e50'}])

      label:{show:true,position:'top',color:'rgba(255,255,255,.7)',fontSize:11}

}

function renderMapChart() {

      .then(r=>r.json())

        document.getElementById('chartMap').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:rgba(255,255,255,.4)">地图加载中，请检查网络连接</div>';
      });

function doRenderMap() {
  const countryCounts = countBy(currentData, d=>d.country);
  const mapData = countryCounts.map(([cn,v])=>({name:COUNTRY_MAP[cn]||cn, value:v}));

    backgroundColor:'transparent',
    tooltip:{trigger:'item',backgroundColor:'rgba(10,10,30,.92)',borderColor:'rgba(255,255,255,.15)',textStyle:{color:'#fff',fontSize:12},formatter:p=>p.value?`<strong style="color:#00c6ff">${p.name}</strong><br/>影片数：${p.value} 部`:p.name},
    visualMap:{min:0,max:150,left:'left',bottom:10,text:['高','低'],textStyle:{color:'rgba(255,255,255,.5)',fontSize:11},calculable:true,inRange:{color:['#1a1a3e','#1e3a5f','#2563eb','#00c6ff','#38bdf8']}},

// ================================================================
//  迷你表格
// ================================================================
function renderMiniTable() {
  const start = (tablePage-1)*TABLE_PAGE_SIZE;
  const pageData = currentData.slice(start, start+TABLE_PAGE_SIZE);
  const tbody = document.getElementById('miniTbody');

  tbody.innerHTML = pageData.map(d=>{
    const rankCls = d.rank===1?'g':d.rank===2?'s':d.rank===3?'b':'o';
    const stars = d.rating>=9.5?'★★★★★':d.rating>=9.0?'★★★★☆':d.rating>=8.5?'★★★★':d.rating>=8.0?'★★★☆':'★★★';
    return `<tr>
      <td><span class="badge-rank ${rankCls}">${d.rank}</span></td>
      <td><strong>${d.title}</strong></td>
      <td style="color:rgba(255,255,255,.6)">${d.director}</td>
      <td style="color:rgba(255,255,255,.5)">${d.country}</td>
      <td style="color:rgba(255,255,255,.5);font-size:11px">${d.genre}</td>
      <td style="color:rgba(255,255,255,.5)">${d.year}</td>
      <td><span class="star-rating">${stars}</span> <strong style="color:#f9d423">${d.rating}</strong></td>
      <td style="color:rgba(255,255,255,.5);font-size:11px">${d.comment||'-'}</td>
    </tr>`;
  }).join('');

  renderMiniPager();
}

function renderMiniPager() {
  const total = currentData.length;
  const totalPages = Math.ceil(total/TABLE_PAGE_SIZE);
  const pager = document.getElementById('miniPager');
  let html = `
    <button class="pager-btn" onclick="setTablePage(${tablePage-1})" ${tablePage===1?'disabled':''}>‹</button>`;
  for(let i=Math.max(1,tablePage-2);i<=Math.min(totalPages,tablePage+2);i++) {
    html += `<button class="pager-btn ${i===tablePage?'active':''}" onclick="setTablePage(${i})">${i}</button>`;
  }
  html += `<button class="pager-btn" onclick="setTablePage(${tablePage+1})" ${tablePage===totalPages?'disabled':''}>›</button>
    <span class="pager-info">${tablePage}/${totalPages} 页 · ${total} 条</span>`;
  pager.innerHTML = html;
}

function setTablePage(p) {
  const totalPages = Math.ceil(currentData.length/TABLE_PAGE_SIZE);
  if(p<1||p>totalPages) return;
  tablePage = p;
  renderMiniTable();
}

// ================================================================
//  文件上传处理（CSV 解析）
// ================================================================
function handleUpload(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text = e.target.result;
      const lines = text.split('\n').filter(l=>l.trim());
      if(lines.length<2) { alert('文件内容不足，请检查格式'); return; }
      const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
      const newData = [];
      for(let i=1;i<lines.length;i++) {
        const vals = lines[i].split(',').map(v=>v.trim().replace(/^"|"$/g,''));
        const row = {};
        headers.forEach((h,idx)=>{ row[h]=vals[idx]||''; });
        const mapped = {
          rank: parseInt(row['排名']||row['rank']||i) || i,
          title: row['片名']||row['title']||'未知',
          director: row['导演']||row['director']||'',
          country: row['制片国家/地区']||row['country']||'',
          genre: row['影片类型']||row['genre']||'',
          year: parseInt(row['上映年份']||row['year'])||2000,
          rating: parseFloat(row['评分']||row['rating'])||8.5,
          duration: parseInt(row['片长']||row['duration'])||120,
          reviews: parseInt((row['评价']||row['reviews']||'0').replace(/,/g,''))||0,
          comment: row['一句话影评']||row['comment']||''
        };
        newData.push(mapped);
      }
      // 用新数据替换（仅当前页面生效，不写入 localStorage）
      FULL_DATA.length = 0;
      newData.forEach(d=>FULL_DATA.push(d));
      currentData = [...FULL_DATA];
      // localStorage 写入已禁用，子页面将继续使用硬编码原始数据
      // 如需恢复跨页面数据共享，请取消下面代码块的注释
      /*
      try {
        localStorage.setItem('douban_top250_data', JSON.stringify(newData));
        localStorage.setItem('douban_top250_ts', new Date().toLocaleString());
      } catch(e) { console.warn('localStorage 写入失败', e); }
      */
      resetAllFilters();
      alert(`✅ 成功加载 ${newData.length} 条数据！\n\n注意：数据仅在当前仪表板页面生效，子页面仍使用原始数据。`);
    } catch(err) {
      alert('解析失败，请确认 CSV 格式正确（需要包含表头行）');
      console.error(err);
    }
  };
  reader.readAsText(file, 'UTF-8');
  event.target.value = '';
}

// ================================================================
//  ECharts 联动点击事件
//  每次图表初始化后立即绑定，用 _bound 标记防止重复注册
// ================================================================
function bindDirectorEvents() {
  if(!charts.director || charts.director._bound) return;
  charts.director._bound = true;
  charts.director.on('click', params=>{
    document.getElementById('sideSearch').value = params.name || '';
    applyFilters();
  });
}

function bindGenreEvents() {
  if(!charts.genre || charts.genre._bound) return;
  charts.genre._bound = true;
  charts.genre.on('click', params=>{
    const val = params.name || '';
    const sel = document.getElementById('fGenre');
    // 如果下拉里有这个选项才设置
    const opt = Array.from(sel.options).find(o=>o.value===val||o.text===val);
    if(opt) sel.value = opt.value;
    else sel.value = '';
    applyFilters();
  });
}

function bindDurationEvents() {
  if(!charts.dur || charts.dur._bound) return;
  charts.dur._bound = true;
  charts.dur.on('click', params=>{
    // 点击时长柱子 → 用搜索框模糊筛选不方便，改为高亮提示即可
    // 实际用途：把时长区间映射到搜索（不影响其他维度筛选）
    // 这里触发全局筛选刷新，保持其他筛选不变
    applyFilters();
  });
}

function bindYearEvents() {
  if(!charts.year || charts.year._bound) return;
  charts.year._bound = true;
  charts.year.on('click', params=>{
    const era = (params.name || '').replace('s','');
    const sel = document.getElementById('fEra');
    // 如果已经选中同一年代则取消（toggle）
    if(sel.value === era) {
      sel.value = '';
    } else {
      sel.value = era;
    }
    applyFilters();
  });
}

function bindMapEvents() {
  if(!charts.map || charts.map._bound) return;
  charts.map._bound = true;
  charts.map.on('click', params=>{
    const enName = params.name || '';
    const entry = Object.entries(COUNTRY_MAP).find(([k,v])=>v===enName);
    const sel = document.getElementById('fCountry');
    if(entry) {
      // toggle：再次点同一国家则取消筛选
      if(sel.value === entry[0]) sel.value = '';
      else sel.value = entry[0];
      applyFilters();
    }
  });
}

function bindChartEvents() {
  bindDirectorEvents();
  bindGenreEvents();
  bindDurationEvents();
  bindYearEvents();
  bindMapEvents();
}

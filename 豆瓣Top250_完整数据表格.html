<script>
(function(){
  const KEY = 'insight_table';
  const ta = document.getElementById('insightText');
  const saved = localStorage.getItem(KEY);
  if(saved) ta.value = saved;
  ta.addEventListener('input', function(){ localStorage.setItem(KEY, ta.value); });
})();
function insightSave(k){
  const ta = document.getElementById('insightText');
  localStorage.setItem('insight_'+k, ta.value);
  const el = document.getElementById('insightSaved');
  el.textContent = '✓ 已保存 ' + new Date().toLocaleTimeString();
  setTimeout(()=>{ el.textContent=''; }, 3000);
}
function insightClear(k){
  if(!confirm('确定清空洞察内容吗？')) return;
  document.getElementById('insightText').value = '';
  localStorage.removeItem('insight_'+k);
}
</script>

// 去重处理
const seen = new Set();
const movieData = rawData.filter(item => {
  const key = item.rank + '|' + item.title;
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
}).sort((a,b) => a.rank - b.rank);

// 分页配置
const PAGE_SIZE = 20;
let currentPage = 1;
let filteredData = [...movieData];
let sortKey = 'rank';
let sortDesc = false;

// 提取筛选选项
const countries = [...new Set(movieData.flatMap(d => d.country.split(' ')))].sort();
const genres = [...new Set(movieData.flatMap(d => d.genre.split(' ')))].sort();
const years = [...new Set(movieData.map(d => Math.floor(d.year/10)*10))].sort((a,b)=>a-b);

// 初始化筛选器
function initFilters() {
  const countrySel = document.getElementById('filterCountry');
  const genreSel = document.getElementById('filterGenre');
  const yearSel = document.getElementById('filterYear');
  const ratingSel = document.getElementById('filterRating');

  countries.forEach(c => countrySel.innerHTML += `<option value="${c}">${c}</option>`);
  genres.forEach(g => genreSel.innerHTML += `<option value="${g}">${g}</option>`);
  years.forEach(y => yearSel.innerHTML += `<option value="${y}">${y}s</option>`);

  ['9.0+', '8.5-8.9', '8.0-8.4'].forEach(r => {
    ratingSel.innerHTML += `<option value="${r}">${r}</option>`;
  });
}

// 格式化数字
function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toString();
}

// 获取评分样式
function getRatingClass(r) {
  if (r >= 9.0) return 'rating-high';
  if (r >= 8.5) return 'rating-mid';
  return 'rating-low';
}

// 获取排名样式
function getRankClass(r) {
  if (r === 1) return 'rank-1';
  if (r === 2) return 'rank-2';
  if (r === 3) return 'rank-3';
  return 'rank-other';
}

// 渲染表格
function renderTable() {
  const tbody = document.getElementById('tableBody');
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = filteredData.slice(start, start + PAGE_SIZE);

  tbody.innerHTML = pageData.map(item => `
    <tr>
      <td class="col-rank"><span class="rank-num ${getRankClass(item.rank)}">${item.rank}</span></td>
      <td class="col-title">${item.title}</td>
      <td class="col-director">${item.director}</td>
      <td class="col-country">${item.country}</td>
      <td class="col-genre">${item.genre}</td>
      <td class="col-year">${item.year}</td>
      <td class="col-rating"><span class="rating ${getRatingClass(item.rating)}">${item.rating}</span></td>
      <td class="col-reviews">${formatNum(item.reviews)}</td>
      <td class="col-comment"><div class="comment-text" title="${item.comment}">${item.comment || '-'}</div></td>
    </tr>
  `).join('');

  document.getElementById('resultCount').textContent = `共 ${filteredData.length} 部影片`;
  renderPagination();
}

// 渲染分页
function renderPagination() {
  const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
  const pagination = document.getElementById('pagination');

  let html = `
    <button class="page-btn" onclick="goPage(1)" ${currentPage===1?'disabled':''}>首页</button>
    <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>上一页</button>
  `;

  for (let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) {
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }

  html += `
    <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>下一页</button>
    <button class="page-btn" onclick="goPage(${totalPages})" ${currentPage===totalPages?'disabled':''}>末页</button>
    <span class="page-info">${currentPage} / ${totalPages} 页</span>
  `;

  pagination.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
  document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth' });
}

// 排序
function sortTable(key) {
  const ths = document.querySelectorAll('th');
  ths.forEach(th => th.classList.remove('sort-asc', 'sort-desc'));

  if (sortKey === key) {
    sortDesc = !sortDesc;
  } else {
    sortKey = key;
    sortDesc = false;
  }

  const th = document.querySelector(`th[data-sort="${key}"]`);
  th.classList.add(sortDesc ? 'sort-desc' : 'sort-asc');

  filteredData.sort((a, b) => {
    let va = a[key], vb = b[key];
    if (typeof va === 'string') {
      va = va.toLowerCase();
      vb = vb.toLowerCase();
    }
    if (sortDesc) [va, vb] = [vb, va];
    return va < vb ? -1 : va > vb ? 1 : 0;
  });

  currentPage = 1;
  renderTable();
}

// 筛选
function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const country = document.getElementById('filterCountry').value;
  const genre = document.getElementById('filterGenre').value;
  const year = document.getElementById('filterYear').value;
  const rating = document.getElementById('filterRating').value;

  filteredData = movieData.filter(item => {
    if (search && !item.title.toLowerCase().includes(search) &&
        !item.director.toLowerCase().includes(search) &&
        !item.genre.toLowerCase().includes(search)) return false;
    if (country && !item.country.includes(country)) return false;
    if (genre && !item.genre.includes(genre)) return false;
    if (year && Math.floor(item.year/10)*10 != year) return false;
    if (rating) {
      if (rating === '9.0+' && item.rating < 9.0) return false;
      if (rating === '8.5-8.9' && (item.rating < 8.5 || item.rating >= 9.0)) return false;
      if (rating === '8.0-8.4' && (item.rating < 8.0 || item.rating >= 8.5)) return false;
    }
    return true;
  });

  currentPage = 1;
  renderTable();
}

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterCountry').value = '';
  document.getElementById('filterGenre').value = '';
  document.getElementById('filterYear').value = '';
  document.getElementById('filterRating').value = '';
  filteredData = [...movieData];
  currentPage = 1;
  renderTable();
}

// 事件监听
document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('filterCountry').addEventListener('change', applyFilters);
document.getElementById('filterGenre').addEventListener('change', applyFilters);
document.getElementById('filterYear').addEventListener('change', applyFilters);
document.getElementById('filterRating').addEventListener('change', applyFilters);

document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => sortTable(th.dataset.sort));
});

// 初始化
initFilters();
renderTable();
</script>
